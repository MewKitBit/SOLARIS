# ─── Location ────────────────────────────────────────────────────────────────
# Describes the geographic point for which data is fetched.
[location]

# Decimal degrees. Positive = north of the equator.
latitude = 43.4636

# Decimal degrees. Positive = east of the prime meridian.
longitude = 3.8226

# IANA timezone string (e.g. "Europe/Paris"). Controls how the returned
# DatetimeIndex is localised. Use "UTC" to keep timestamps in UTC.
timezone = "UTC"

# ─── Period ──────────────────────────────────────────────────────────────────
# Inclusive date range for all data fetching operations.
[period]

# ISO 8601 date string (YYYY-MM-DD). First day of the requested range.
start_date = "2020-01-01"

# ISO 8601 date string (YYYY-MM-DD). Last day of the requested range.
end_date = "2020-12-31"

# ─── Solar ───────────────────────────────────────────────────────────────────
# Panel geometry passed to PVGIS. Determines how raw solar radiation is
# projected onto the panel surface to produce plane-of-array (POA) irradiance.
[solar]

# Angle between the panel and the horizontal ground plane, in degrees.
# 0° = flat, 90° = vertical. Typical fixed installations: 25–35°.
tilt = 30.0

# Compass direction the panel faces, in degrees clockwise from north.
# 180° = due south, which maximises annual yield in the northern hemisphere.
azimuth = 180.0
