# solaris.toml — unified config for the SOLARIS project.
[location]
latitude  = 43.4636 # decimal degrees, positive = north
longitude = 3.8226 # decimal degrees, positive = east
timezone  = "UTC" # IANA timezone; localises the gathered DatetimeIndex

[period]
start_date = "2005-01-01" # ISO 8601 date, inclusive
end_date   = "2020-12-31" # ISO 8601 date, inclusive

[runtime]
master_seed   = 42 # root entropy for per-panel-per-effect RNG seeding
num_panels    = 1000 # total fleet size
memory_cap_gb = 16.0 # maximum ram usage limit (aproximate) to be split across workers
num_workers   = 3 # 1 = single-core; >1 = multiprocessing.Pool size

[paths]
intake_file = "inputs/input_data.csv" # output of meteorology_helpers/gather_data.py -c
output_dir  = "output/" # chunked parquet files written here

[singlediode]
method = "NEWTON" # one of SingleDiodeMethod enum members

[temperature]
model = "SAPM_OPEN_RACK_GLASS" # one of TemperatureModel enum members

[incident_angle]
model = "PHYSICAL" # one of IncidentAngleModel enum values
# Per-model glass parameters; only the set matching `model` is consumed.
n = 1.526 # PHYSICAL: refractive index
K = 4.0 # PHYSICAL: glazing extinction coefficient (1/m)
L = 0.002 # PHYSICAL: glazing thickness (m)
# b   = 0.05 # ASHRAE
# a_r = 0.16 # MARTIN_RUIZ

[module]
# CEC single-diode reference parameters; sourced from the CEC module database
# entry for the modelled panel.
alpha_sc = 0.0042
a_ref    = 1.6816
I_L_ref  = 9.66
I_o_ref  = 5.94e-11
R_sh_ref = 480.5
R_s      = 0.39383
Adjust   = 11.4

[mounting]
# Array orientation
surface_tilt    = 30.0 # degrees from horizontal
surface_azimuth = 180.0 # degrees clockwise from north

# Effects are nested arrays of tables: one outer key per concrete failure class
# (matching its `type` class attribute, e.g. `pid`), one inner entry per
# registered instance of that class. The instance's `name` becomes its
# attribution column prefix and must be unique across all effects (enforced by
# effect_generator.validate_effects).
# [[effects.pid]]
# name                   = "pid"
# beta                   = 1.5 # Weibull shape parameter
# eta_hours              = 50000.0 # Weibull scale parameter (effective stress hours)

[[effects.soiling_variant]]
name                  = "soiling" # attribution column prefix; must be unique across effects
max_soiling_effect    = 0.3 # cap on the fractional irradiance loss (0..1); 0.3 = up to 30% loss
avg_hourly_progression = 1.0e-5 # mean per-hour increase in the soiling fraction (positive drift)
std_deviation         = 3.0e-5 # per-step noise on the progression; negative draws model cleaning
# Initial-soiling distribution (optional; fall back to the constructor defaults if omitted)
starting_median_fraction = 0.25 # median initial level as a fraction of max_soiling_effect
starting_shape_sigma     = 0.5 # sigma of the lognormal initial-level draw; larger = wider spread